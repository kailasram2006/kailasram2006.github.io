<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kailas R</title>
    <style>
        /* Modern Reset & Dark Theme Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #f0f6fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            animation: fadeIn 1s ease-in-out;
        }

        /* Big Bold Name Styling */
        h1 {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #8b949e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            font-weight: 500;
            color: #58a6ff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .institution {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 400;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* Subtle Accent Divider */
        .divider {
            height: 1px;
            width: 80px;
            background: #30363d;
            margin: 0 auto 40px auto;
        }

        /* Clean Link Buttons */
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 30px;
            background-color: #21262d;
            color: #c9d1d9;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid #30363d;
            transition: all 0.25s ease;
        }

        .btn:hover {
            background-color: #30363d;
            color: #ffffff;
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>KAILAS R</h1>
        <div class="subtitle">2nd Year Student</div>
        <div class="institution">IIT Bhubaneswar</div>

        <div class="divider"></div>

        <div class="links">
            <!-- Replace the '#' inside href="..." with your real profile URLs -->
            <a href="mailto:your-email@iitbbs.ac.in" class="btn">Email</a>
            <a href="https://linkedin.com/in/yourprofile" class="btn" target="_blank">LinkedIn</a>
            <a href="https://github.com/yourusername" class="btn" target="_blank">GitHub</a>
        </div>
    </div>

</body>
</html>
